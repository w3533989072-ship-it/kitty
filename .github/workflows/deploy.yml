name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# 必须加的权限配置，否则 Pages 无法部署
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      # 核心：执行脚本，生成 vod.m3u8 到根目录
      - name: Build 小猫源订阅文件
        run: npx tsx vod.ts

      # 验证文件是否生成，排查空文件
      - name: Verify vod.m3u8
        run: |
          ls -la ./vod.m3u8
          cat ./vod.m3u8

      # 只部署根目录的 vod.m3u8，避免上传源码
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./vod.m3u8

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
