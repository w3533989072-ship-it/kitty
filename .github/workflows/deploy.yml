name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]  # 改为你的主分支，如master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20  # 已删除 cache: 'npm'，避免锁文件错误

      - name: Install dependencies
        run: npm install

      # 核心修改：用 tsx 代替 ts-node，彻底解决 .ts 后缀错误
      - name: Build 小猫源订阅文件
        run: npx tsx vod.ts

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages
          clean: true
