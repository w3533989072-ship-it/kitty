name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build 小猫源订阅文件
        run: npx tsx vod.ts

      # 只部署根目录的 vod.m3u8，彻底解决空文件/源码问题
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./vod.m3u8

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
